<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#667eea" />
    <meta name="description" content="Blind Tech Abbas Ali - Accessibility App" />
    <title>Blind Tech Abbas Ali</title>
    <style>
      /* Reset and base */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        height: 100%;
        width: 100%;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 20px;
        /* Prevent text selection on splash screen */
        -webkit-user-select: none;
        user-select: none;
      }

      /* Main container */
      .container {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 20px;
        padding: 48px 40px;
        text-align: center;
        max-width: 380px;
        width: 100%;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      }

      /* Main heading */
      .heading {
        font-size: 2.4rem;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: -0.5px;
        margin-bottom: 12px;
        line-height: 1.2;
        /* Ensure emoji renders well on Android */
        font-variant-emoji: text;
      }

      /* Subtitle */
      .subtitle {
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.88);
        font-weight: 400;
        margin-bottom: 32px;
        line-height: 1.5;
      }

      /* Status box */
      .status-box {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 50px;
        padding: 10px 24px;
        font-size: 0.95rem;
        font-weight: 600;
        color: #ffffff;
        letter-spacing: 0.3px;
      }

      .status-icon {
        color: #a8ffb0;
        font-size: 1rem;
        font-style: normal;
      }

      /* Responsive: small phones */
      @media (max-width: 360px) {
        .container {
          padding: 36px 24px;
        }

        .heading {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="container" role="main">
      <h1 class="heading" aria-label="Blind Tech - Audio app">🔊 Blind Tech</h1>
      <p class="subtitle">Abbas Ali - Accessibility App</p>
      <div class="status-box" role="status" aria-live="polite">
        <i class="status-icon" aria-hidden="true">✓</i>
        App Ready
      </div>
    </main>
  </body>
</html>
